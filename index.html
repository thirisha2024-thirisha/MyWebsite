<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supply Chain Management</title>

    <!-- Connect CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>Supply Chain Management (SCM)</h1>

    <h2>Definition</h2>
    <p>
        Supply Chain Management manages the flow of goods,
        services, and information from supplier to customer.
    </p>

    <h2>Key Components</h2>
    <ul>
        <li>Planning</li>
        <li>Sourcing</li>
        <li>Manufacturing</li>
        <li>Delivery</li>
        <li>Returns</li>
    </ul>

    <!-- Buttons -->
    <button onclick="showMessage()">Show Message</button>
    <button onclick="changeColor()">Change Background</button>
    <button onclick="showTime()">Show Time</button>

    <p id="time"></p>
</div>

<!-- Connect JavaScript -->
<script src="script.js"></script>

</body>
</html>
